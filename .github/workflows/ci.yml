# ─────────────────────────────────────────────────────────────
# PathForge — CI Pipeline
# ─────────────────────────────────────────────────────────────
# Runs on: push to main, PRs to main/production
# Jobs: api-quality (lint + test), web-quality (lint + build)
# Uses path filters to skip irrelevant jobs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect Changed Paths ─────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'docker/Dockerfile.api'
              - 'docker/Dockerfile.worker'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'docker/Dockerfile.web'
              - 'package.json'
              - 'pnpm-lock.yaml'
            mobile:
              - 'apps/mobile/**'
              - 'packages/shared/**'

  # ── API Quality Gate ─────────────────────────────────────
  api-quality:
    name: API — Lint & Test
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        working-directory: apps/api
        run: pip install ".[dev,ai]"

      - name: Lint (ruff)
        working-directory: apps/api
        run: python -m ruff check app/ tests/

      - name: Type check (mypy)
        working-directory: apps/api
        continue-on-error: true # Non-blocking: pre-existing type gaps tracked as tech debt
        run: python -m mypy app/ --ignore-missing-imports

      - name: Test (pytest)
        working-directory: apps/api
        run: python -m pytest tests/ -v --tb=short -q
        env:
          ENVIRONMENT: testing
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-min

      - name: Migration SQL validation (Sprint 36 WS-2)
        working-directory: apps/api
        run: python scripts/alembic_verify.py --sql-only
        env:
          ENVIRONMENT: testing

      # Sprint 30 Audit H3: Dependency vulnerability scan
      - name: Security audit (pip-audit)
        working-directory: apps/api
        continue-on-error: true # Non-blocking: initial baseline
        run: |
          pip install pip-audit
          python -m pip_audit --desc --progress-spinner off

  # ── Web Quality Gate ─────────────────────────────────────
  web-quality:
    name: Web — Lint & Build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: apps/web
        run: pnpm lint

      - name: Test
        working-directory: apps/web
        run: pnpm test

      - name: Build
        working-directory: apps/web
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # Sprint 30 Audit H3: Dependency vulnerability scan
      - name: Security audit (pnpm audit)
        continue-on-error: true # Non-blocking: initial baseline
        run: pnpm audit --prod --no-optional

  # ── Mobile Quality Gate ───────────────────────────────────
  mobile-quality:
    name: Mobile — Lint & Typecheck
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: apps/mobile
        run: pnpm lint

      - name: Typecheck
        working-directory: apps/mobile
        run: pnpm typecheck

      - name: Test
        working-directory: apps/mobile
        run: pnpm test

  # ── Visual Regression (Sprint 36 WS-7) ─────────────────────
  visual-regression:
    name: Visual Regression & Performance Baselines
    needs: [changes, web-quality]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Build web app
        working-directory: apps/web
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # webServer: pnpm start auto-started by playwright.config.ts
      - name: Run visual regression tests
        id: visual-tests
        working-directory: apps/web
        run: npx playwright test e2e/visual-regression.spec.ts --project=chromium
        env:
          CI: "true"
          UPDATE_SNAPSHOTS: "false"

      - name: Run performance & accessibility baselines
        id: perf-tests
        working-directory: apps/web
        run: npx playwright test e2e/performance-baseline.spec.ts --project=chromium
        env:
          CI: "true"
          UPDATE_SNAPSHOTS: "false"

      - name: Upload visual diff results
        if: always() && (steps.visual-tests.outcome == 'failure' || steps.perf-tests.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: apps/web/test-results/
          retention-days: 14

      - name: Fail on visual regression
        if: steps.visual-tests.outcome == 'failure'
        run: |
          echo "::error::Visual regression tests failed. Review diff artifacts."
          echo "To update baselines, trigger the 'Update Visual Regression Baselines' workflow manually."
          exit 1
