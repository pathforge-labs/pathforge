<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to {{app_name}}</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#0a0a0f;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table width="560" cellpadding="0" cellspacing="0" role="presentation" style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-radius:16px;border:1px solid rgba(139,92,246,0.2);">
          <tr>
            <td style="padding:40px;">
              <!-- Logo -->
              <h1 style="margin:0 0 8px;font-size:24px;font-weight:700;color:#a78bfa;letter-spacing:-0.5px;">{{app_name}}</h1>
              <p style="margin:0 0 32px;font-size:13px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:2px;">Career Intelligence Platform</p>

              <!-- Content -->
              <h2 style="margin:0 0 16px;font-size:20px;font-weight:600;color:#ffffff;">Welcome aboard! 🎉</h2>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:rgba(255,255,255,0.7);">
                Hi {{name}}, your email has been verified and your {{app_name}} account is ready. Start mapping your career intelligence today.
              </p>

              <!-- CTA Button -->
              <table cellpadding="0" cellspacing="0" role="presentation" style="margin:0 0 32px;">
                <tr>
                  <td style="background:linear-gradient(135deg,#8b5cf6,#a78bfa);border-radius:12px;padding:14px 32px;">
                    <a href="{{dashboard_url}}" style="color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;display:inline-block;">
                      Go to Dashboard
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Footer -->
              <hr style="border:none;border-top:1px solid rgba(139,92,246,0.15);margin:0 0 24px;" />
              <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.3);">
                You're receiving this because you signed up for {{app_name}}.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
